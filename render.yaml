services:
  - type: web
    name: sm-glamour-store
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: TINY_TOKEN
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_PUBLIC_KEY
        sync: false
      - key: APP_URL
        value: "https://sm-glamour-store.onrender.com"
      - key: NODE_VERSION
        value: "20.x"
